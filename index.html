<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <title>Gestion de Peliculas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestion de Peliculas</h1>
    <form id="formulario-pelicula">
        <input type="text" id="titulo" placeholder="Titulo" required>
        <input type="text" id="director" placeholder="Director" required>
        <input type="number" id="anio" placeholder="Año" required>
        <input type="hidden" id="pelicula_id">
        <button type="submit" id="bagreg">Agregar Pelicula</button>     
    </form>
    <h2>Lista de Peliculas</h2>
    <ul id="lista-peliculas"></ul>
    <script src="app.js"></script>
</body>
</html>
